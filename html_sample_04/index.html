   <h1>様々なリスト</h1>
<h2>ul</h2>
<p>好きなバンド</p>
<ul>
  <li>PEOPLE 1</li>
  <li>つきみ</li>
  <li>銀杏BOYZ
  </li>
</ul>

<h2>ol</h2>
<p>好きなたべものベスト3（好きな順）</p>
<ol>
  <li>えび</li>
  <li>トマト</li>
  <li>クッキー</li>
</ol>

<h2>dl</h2>
<p>よくある質問</p>
<dl>
  <dt>Q:えびはいつから好きですか</dt>
  <dd>A:3歳の誕生日でえび料理のお店にいきました</dd>
  <dt>Q:PEOPLE 1は何人組ですか</dt>
  <dd>A:基本の3人にサポートメンバー2人です</dd>
</dl>
